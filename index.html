<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sowar Chat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-color: #075e54; --s-color: #128c7e; --bg: #e5ddd5; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #f0f2f5; overflow: hidden; }
        
        /* شاشة التسجيل */
        #login-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .profile-upload { position: relative; width: 100px; height: 100px; border-radius: 50%; background: #eee; margin-bottom: 20px; cursor: pointer; border: 2px dashed #075e54; overflow: hidden; }
        .profile-upload img { width: 100%; height: 100%; object-fit: cover; }
        input[type="text"] { width: 80%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; text-align: center; }

        /* واجهة الدردشة */
        #chat-screen { display: none; flex-direction: column; height: 100vh; }
        .header { background: var(--p-color); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #fff; }
        
        #messages-container { flex: 1; overflow-y: auto; padding: 15px; background: var(--bg); display: flex; flex-direction: column; gap: 8px; padding-bottom: 120px; }
        
        .message { max-width: 80%; padding: 8px; border-radius: 10px; background: white; position: relative; cursor: pointer; box-shadow: 0 1px 2px #0002; }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; }
        .msg-user { font-size: 11px; font-weight: bold; color: var(--s-color); display: flex; align-items: center; gap: 5px; }
        .msg-avatar { width: 20px; height: 20px; border-radius: 50%; }
        
        /* نظام الرد */
        .reply-box { font-size: 12px; background: rgba(0,0,0,0.05); border-right: 3px solid var(--p-color); padding: 5px; margin-bottom: 5px; border-radius: 4px; }
        #reply-preview { display: none; background: #eee; padding: 10px; border-top: 1px solid #ddd; position: fixed; bottom: 60px; width: 100%; z-index: 90; }

        .input-area { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 10px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ddd; z-index: 100; }
        #msg-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .btn-send { background: var(--s-color); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="profile-upload" onclick="document.getElementById('file-input').click()">
            <img id="preview-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </div>
        <input type="file" id="file-input" hidden accept="image/*" onchange="previewFile()">
        <input type="text" id="username-input" placeholder="اكتب اسمك المستعار...">
        <button onclick="handleLogin()" style="width:80%; padding:12px; background:var(--p-color); color:white; border:none; border-radius:10px;">دخول</button>
    </div>

    <div id="chat-screen">
        <div class="header">
            <img id="my-header-avatar" class="user-avatar">
            <div id="my-header-name">الدردشة العامة</div>
        </div>
        
        <div id="messages-container"></div>

        <div id="reply-preview">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <small id="reply-text" style="color:#666;"></small>
                <button onclick="cancelReply()" style="border:none; background:none; color:red;">✕</button>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="اكتب رسالة...">
            <button class="btn-send" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCM6MIW3xGrKVR3LIaQoVfBZjAXstm1ZCw",
            authDomain: "sowarchat.firebaseapp.com",
            databaseURL: "https://sowarchat-default-rtdb.firebaseio.com",
            projectId: "sowarchat",
            storageBucket: "sowarchat.firebasestorage.app",
            messagingSenderId: "432871645358",
            appId: "1:432871645358:web:59ca9b1e9f542f27d34d3f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let selectedReply = null;
        let userAvatar = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        window.previewFile = () => {
            const file = document.getElementById('file-input').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                userAvatar = reader.result;
                document.getElementById('preview-img').src = reader.result;
            }
            if (file) reader.readAsDataURL(file);
        };

        window.handleLogin = () => {
            const name = document.getElementById('username-input').value.trim();
            if(name) {
                localStorage.setItem('sowar_user', name);
                localStorage.setItem('sowar_avatar', userAvatar);
                location.reload();
            }
        };

        if(localStorage.getItem('sowar_user')) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('my-header-avatar').src = localStorage.getItem('sowar_avatar');
            startChat();
        }

        function startChat() {
            const chatRef = ref(db, 'pro_chat');
            
            window.sendMessage = () => {
                const text = document.getElementById('msg-input').value.trim();
                if(text) {
                    push(chatRef, {
                        name: localStorage.getItem('sowar_user'),
                        avatar: localStorage.getItem('sowar_avatar'),
                        text: text,
                        replyTo: selectedReply,
                        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
                    });
                    document.getElementById('msg-input').value = "";
                    cancelReply();
                }
            };

            onChildAdded(chatRef, (data) => {
                const msg = data.val();
                renderMessage(msg);
            });
        }

        function renderMessage(msg) {
            const container = document.getElementById('messages-container');
            const isMe = msg.name === localStorage.getItem('sowar_user');
            const div = document.createElement('div');
            div.className = `message ${isMe ? 'sent' : 'received'}`;
            div.onclick = () => setReply(msg);
            
            let replyHTML = msg.replyTo ? `<div class="reply-box"><b>${msg.replyTo.name}:</b> ${msg.replyTo.text}</div>` : "";
            
            div.innerHTML = `
                ${replyHTML}
                <div class="msg-user"><img src="${msg.avatar}" class="msg-avatar"> ${msg.name}</div>
                <div>${msg.text}</div>
                <div style="font-size:9px; text-align:left; opacity:0.6;">${msg.time}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        window.setReply = (msg) => {
            selectedReply = { name: msg.name, text: msg.text };
            document.getElementById('reply-preview').style.display = 'block';
            document.getElementById('reply-text').innerText = `الرد على ${msg.name}: ${msg.text}`;
        };

        window.cancelReply = () => {
            selectedReply = null;
            document.getElementById('reply-preview').style.display = 'none';
        };
    </script>
</body>
</html>
